openapi: 3.1.0
info:
  title: (S)AGE API
  version: 8.1.1
  description: >-
    (Sovereign) Agent Governed Experience — REST API for memory submission,
    validation, and query.
  contact:
    name: Dhillon Andrew Kannabhiran
    email: dhillon@levelupctf.com
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development

# ---------------------------------------------------------------------------
# Security — Ed25519 signature authentication via headers
# ---------------------------------------------------------------------------
security:
  - ed25519Auth: []

components:
  # -----------------------------------------------------------------------
  # Security Schemes
  # -----------------------------------------------------------------------
  securitySchemes:
    ed25519Auth:
      type: apiKey
      in: header
      name: X-Agent-ID
      description: >-
        Ed25519 authentication is conveyed through three headers sent together:
        **X-Agent-ID** (hex-encoded public key), **X-Signature** (Ed25519
        signature of the canonical request payload), and **X-Timestamp** (unix
        epoch seconds). All three must be present on authenticated endpoints.

  # -----------------------------------------------------------------------
  # Parameters
  # -----------------------------------------------------------------------
  parameters:
    memoryId:
      name: memory_id
      in: path
      required: true
      description: Unique memory object identifier (UUID v7).
      schema:
        type: string
        format: uuid

  # -----------------------------------------------------------------------
  # Schemas
  # -----------------------------------------------------------------------
  schemas:
    # -- Enums -------------------------------------------------------------
    MemoryType:
      type: string
      enum:
        - fact
        - observation
        - inference
        - task
      description: Classification of the memory object.

    MemoryStatus:
      type: string
      enum:
        - proposed
        - validated
        - committed
        - challenged
        - deprecated
      description: Lifecycle state of a memory object.

    VoteDecisionEnum:
      type: string
      enum:
        - accept
        - reject
        - abstain

    # -- Core domain objects -----------------------------------------------
    KnowledgeTriple:
      type: object
      required:
        - subject
        - predicate
        - object
      properties:
        subject:
          type: string
          description: Subject entity of the triple.
        predicate:
          type: string
          description: Relationship between subject and object.
        object:
          type: string
          description: Object entity of the triple.

    MemoryRecord:
      type: object
      required:
        - memory_id
        - submitting_agent
        - content
        - content_hash
        - memory_type
        - domain_tag
        - confidence_score
        - status
        - created_at
      properties:
        memory_id:
          type: string
          format: uuid
          description: Unique identifier (UUID v7).
        submitting_agent:
          type: string
          description: Hex-encoded Ed25519 public key of the proposing agent.
        content:
          type: string
          description: Natural-language memory content.
        content_hash:
          type: string
          description: SHA-256 hash of content (hex-encoded).
        embedding:
          type: array
          items:
            type: number
            format: float
          description: 1536-dimensional embedding vector.
        embedding_hash:
          type: string
          description: SHA-256 hash of the embedding vector (hex-encoded).
        memory_type:
          $ref: "#/components/schemas/MemoryType"
        domain_tag:
          type: string
          description: Domain or topic tag for the memory.
        confidence_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: >-
            Current confidence at query time: the agent-assigned score after
            time decay and the corroboration boost are applied.
        corroboration_count:
          type: integer
          minimum: 0
          description: >-
            Number of distinct corroborations backing this memory — the
            multiplier behind the corroboration boost in confidence_score.
            Returned on recall paths (/v1/memory/query, /search, /hybrid) so
            readers can tell a low score caused by no corroboration (a fresh,
            untested belief) from one caused by time decay (a once-solid fact).
        classification:
          type: integer
          minimum: 0
          maximum: 4
          description: >-
            Per-record clearance level: 0=PUBLIC, 1=INTERNAL, 2=CONFIDENTIAL,
            3=SECRET, 4=TOPSECRET.
        status:
          $ref: "#/components/schemas/MemoryStatus"
        parent_hash:
          type: string
          description: Hash of the parent memory (for lineage), if any.
        task_status:
          type: string
          description: >-
            For task-type memories: planned, in_progress, done, or dropped.
        knowledge_triples:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeTriple"
          description: Extracted knowledge graph triples.
        votes:
          type: array
          items:
            type: object
            properties:
              voter_id:
                type: string
              decision:
                $ref: "#/components/schemas/VoteDecisionEnum"
              rationale:
                type: string
              voted_at:
                type: string
                format: date-time
          description: Votes cast on this memory.
        corroborations:
          type: array
          items:
            type: object
            properties:
              agent_id:
                type: string
              evidence:
                type: string
              created_at:
                type: string
                format: date-time
          description: Corroborations supporting this memory.
        linked_memories:
          type: array
          items:
            type: object
          description: Memories linked to this one.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the memory was proposed.
        committed_at:
          type: string
          format: date-time
          description: Timestamp when the memory reached committed status.

    # -- Request bodies ----------------------------------------------------
    MemorySubmitRequest:
      type: object
      required:
        - content
        - memory_type
        - domain_tag
        - confidence_score
      properties:
        content:
          type: string
          description: Natural-language memory content.
        memory_type:
          $ref: "#/components/schemas/MemoryType"
        domain_tag:
          type: string
          description: Domain or topic tag.
        confidence_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Agent-assigned confidence (0–1).
        classification:
          type: integer
          minimum: 0
          maximum: 4
          description: >-
            Per-record clearance: 0=PUBLIC, 1=INTERNAL, 2=CONFIDENTIAL,
            3=SECRET, 4=TOPSECRET. Omitting or sending 0 stores as PUBLIC.
        embedding:
          type: array
          items:
            type: number
            format: float
          description: Optional precomputed embedding vector; stored off-chain via supplementary cache.
        knowledge_triples:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeTriple"
          description: Optional knowledge graph triples.
        parent_hash:
          type: string
          description: Hash of a parent memory for lineage tracking.
        task_status:
          type: string
          description: >-
            For task-type memories: planned, in_progress, done, or dropped.
        tags:
          type: array
          items:
            type: string
          description: >-
            Optional user-defined labels attached after consensus commit.
            Stored as node-local metadata (not part of the on-chain tx);
            queryable via `tags` on /v1/memory/query and /v1/memory/search.
        provider:
          type: string
          description: Stored off-chain only; not on-chain.

    MemoryQueryRequest:
      type: object
      required:
        - embedding
      properties:
        embedding:
          type: array
          items:
            type: number
            format: float
          description: Query embedding for similarity search.
        domain_tag:
          type: string
          description: Optional domain filter.
        provider:
          type: string
          description: Optional provider filter.
        min_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Minimum confidence threshold.
        status_filter:
          $ref: "#/components/schemas/MemoryStatus"
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Number of results to return (max 100).
        cursor:
          type: string
          description: Opaque pagination cursor from a previous response.
        tags:
          type: array
          items:
            type: string
          description: >-
            Optional filter — when non-empty, restricts results to memories
            tagged with ANY of the listed values (OR semantics). SQLite-only;
            ignored on PostgresStore.

    MemorySearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Full-text search query.
        domain_tag:
          type: string
          description: Optional domain filter.
        provider:
          type: string
          description: Optional provider filter.
        min_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        status_filter:
          $ref: "#/components/schemas/MemoryStatus"
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        tags:
          type: array
          items:
            type: string
          description: OR-filter by tag; SQLite only.

    HybridExpansion:
      type: object
      properties:
        query:
          type: string
          description: Paraphrase variant text.
        embedding:
          type: array
          items:
            type: number
            format: float
          description: Precomputed embedding for this variant.

    MemoryHybridRequest:
      type: object
      description: >-
        At least one of `query` or `embedding` is required.
      properties:
        query:
          type: string
          description: Text query for the FTS5 arm.
        embedding:
          type: array
          items:
            type: number
            format: float
          description: Vector for the similarity arm.
        expansions:
          type: array
          items:
            $ref: "#/components/schemas/HybridExpansion"
          description: Paraphrase variants for multi-variant RRF recall.
        domain_tag:
          type: string
        provider:
          type: string
        min_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        status_filter:
          $ref: "#/components/schemas/MemoryStatus"
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        tags:
          type: array
          items:
            type: string

    FilterInfo:
      type: object
      description: Surfaces server-side filters that hid data from the caller.
      properties:
        by:
          type: array
          items:
            type: string
          description: >-
            Filter identifiers applied. Values: rbac_submitting_agents,
            classification.
        total_before_filter:
          type: integer
        visible:
          type: integer
        hidden_count:
          type: integer

    MemoryQueryResponse:
      type: object
      required:
        - results
        - total_count
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
        next_cursor:
          type: string
          description: Cursor for the next page, absent if no more results.
        total_count:
          type: integer
          description: Total number of matching memories.
        filtered:
          $ref: "#/components/schemas/FilterInfo"

    MemoryLinkRequest:
      type: object
      required:
        - source_id
        - target_id
      properties:
        source_id:
          type: string
        target_id:
          type: string
        link_type:
          type: string
          default: related
          description: Relationship type; defaults to "related".

    MemoryLinkResponse:
      type: object
      properties:
        source_id:
          type: string
        target_id:
          type: string
        link_type:
          type: string

    PreValidateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
        domain:
          type: string
        type:
          type: string
        confidence:
          type: number
          format: double

    PreValidateVote:
      type: object
      properties:
        validator:
          type: string
        decision:
          type: string
        reason:
          type: string

    PreValidateResponse:
      type: object
      properties:
        accepted:
          type: boolean
        quorum:
          type: string
          example: "3/3"
        votes:
          type: array
          items:
            $ref: "#/components/schemas/PreValidateVote"

    TaskStatusUpdateRequest:
      type: object
      required:
        - task_status
      properties:
        task_status:
          type: string
          enum:
            - planned
            - in_progress
            - done
            - dropped

    TaskStatusUpdateResponse:
      type: object
      properties:
        memory_id:
          type: string
        task_status:
          type: string

    ForgetRequest:
      type: object
      properties:
        reason:
          type: string
          description: Optional reason; defaults to "deprecated by user" if omitted.

    ForgetResponse:
      type: object
      required:
        - message
        - tx_hash
      properties:
        message:
          type: string
        tx_hash:
          type: string

    VoteRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          $ref: "#/components/schemas/VoteDecisionEnum"
        rationale:
          type: string
          description: Optional rationale for the vote.

    ChallengeRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          description: Reason for challenging the memory.
        evidence:
          type: string
          description: Optional supporting evidence.

    CorroborateRequest:
      type: object
      properties:
        evidence:
          type: string
          description: Optional supporting evidence.

    # -- Response bodies ---------------------------------------------------
    MemorySubmitResponse:
      type: object
      required:
        - memory_id
        - tx_hash
        - status
      properties:
        memory_id:
          type: string
          format: uuid
        tx_hash:
          type: string
          description: CometBFT transaction hash (hex-encoded).
        status:
          $ref: "#/components/schemas/MemoryStatus"

    VoteResponse:
      type: object
      required:
        - message
        - tx_hash
      properties:
        message:
          type: string
        tx_hash:
          type: string
          description: CometBFT transaction hash (hex-encoded).

    ChallengeResponse:
      type: object
      required:
        - message
        - tx_hash
      properties:
        message:
          type: string
        tx_hash:
          type: string

    CorroborateResponse:
      type: object
      required:
        - message
        - tx_hash
      properties:
        message:
          type: string
        tx_hash:
          type: string

    AgentProfile:
      type: object
      required:
        - agent_id
        - display_name
        - domains
        - poe_weight
        - vote_count
        - accuracy
        - on_chain_height
      properties:
        agent_id:
          type: string
          description: Hex-encoded Ed25519 public key.
        display_name:
          type: string
          description: Mutable display name (GUI-editable).
        domains:
          type: array
          items:
            type: string
          description: Distinct domain tags the agent has submitted memories under, ordered by participation frequency.
        poe_weight:
          type: number
          format: double
          description: Current Proof-of-Experience weight.
        vote_count:
          type: integer
          description: Total votes cast.
        accuracy:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Global verdict-correctness EWMA — the alpha factor of the PoE quorum weight. Cold-start-blended (0.5 prior, transitions toward the real score after K_min=10 observations). Since v8.6.0 read from the authoritative on-chain vstats record.
        corr_count:
          type: integer
          format: int64
          description: "Lifetime count of votes that matched a terminal verdict (the delta corroboration factor). Read from the on-chain vstats record. (v8.6.0+)"
        domain_expertise:
          type: object
          additionalProperties:
            type: number
            format: double
          description: "Per-domain verdict-correctness EWMA (the beta factor, from vstats_domain), keyed by domain tag. Only present for domains the agent has voted in. (v8.6.0+)"
        on_chain_height:
          type: integer
          format: int64
          description: Block height at which the agent was registered on-chain (0 for legacy / unregistered).

    AgentRegisterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable agent name.
        role:
          type: string
          description: "One of: admin, member, observer. Defaults to member."
        boot_bio:
          type: string
          description: Agent bio / system prompt description.
        provider:
          type: string
          description: MCP provider identifier (e.g., "claude-code", "cursor").
        p2p_address:
          type: string
          description: Peer-to-peer address.

    AgentUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated agent name.
        boot_bio:
          type: string
          description: Updated agent bio.

    AgentSetPermissionRequest:
      type: object
      properties:
        clearance:
          type: integer
          minimum: 0
          maximum: 4
          description: >-
            Clearance tier (0=PUBLIC, 1=INTERNAL, 2=CONFIDENTIAL, 3=SECRET,
            4=TOPSECRET). Preserved if omitted (PATCH semantics).
        domain_access:
          type: string
          description: JSON-encoded domain access map.
        visible_agents:
          type: string
          description: JSON array of agent IDs this agent can see, or "*" for all.
        org_id:
          type: string
          description: Organization ID.
        dept_id:
          type: string
          description: Department ID.

    RegisteredAgent:
      type: object
      properties:
        agent_id:
          type: string
          description: Hex-encoded Ed25519 public key.
        name:
          type: string
        role:
          type: string
        boot_bio:
          type: string
        provider:
          type: string
        status:
          type: string
        clearance:
          type: integer
        on_chain_height:
          type: integer
          format: int64
          description: Block height where registered on-chain.
        visible_agents:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ValidatorScore:
      type: object
      required:
        - validator_id
        - accuracy
        - domain_score
        - recency_score
        - corr_score
        - raw_weight
        - capped_weight
        - normalized_weight
      properties:
        validator_id:
          type: string
        accuracy:
          type: number
          format: double
        domain_score:
          type: number
          format: double
        recency_score:
          type: number
          format: double
        corr_score:
          type: number
          format: double
        raw_weight:
          type: number
          format: double
        capped_weight:
          type: number
          format: double
        normalized_weight:
          type: number
          format: double

    EpochInfo:
      type: object
      required:
        - epoch_num
        - block_height
        - scores
      properties:
        epoch_num:
          type: integer
          description: Current epoch number.
        block_height:
          type: integer
          format: int64
          description: Block height at epoch start.
        scores:
          type: array
          items:
            $ref: "#/components/schemas/ValidatorScore"

    PendingMemoriesResponse:
      type: object
      required:
        - memories
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
        next_cursor:
          type: string

    # -- Access Control -------------------------------------------------------
    AccessRequestBody:
      type: object
      required:
        - target_domain
      properties:
        target_domain:
          type: string
        justification:
          type: string
        requested_level:
          type: integer
          description: 1=read, 2=read+write. Defaults to 1.

    AccessGrantRequest:
      type: object
      required:
        - grantee_id
        - domain
      properties:
        grantee_id:
          type: string
          description: Hex agent ID of the grantee.
        domain:
          type: string
        level:
          type: integer
          description: 1=read, 2=read+write. Defaults to 1.
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp; 0=permanent.
        request_id:
          type: string
          description: Links to originating access request.

    AccessRevokeRequest:
      type: object
      required:
        - grantee_id
        - domain
      properties:
        grantee_id:
          type: string
        domain:
          type: string
        reason:
          type: string

    # -- Domains ---------------------------------------------------------------
    DomainRegisterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        parent:
          type: string

    # -- Governance (v8.0 payload-aware) ----------------------------------------
    GovProposeRequest:
      type: object
      required:
        - operation
        - target_id
        - reason
      properties:
        operation:
          type: string
          enum:
            - add_validator
            - remove_validator
            - update_power
            - domain_reassign
          description: >-
            Governance operation. `domain_reassign` (v8.0) is the
            access-control recovery primitive — it carries the target
            DomainReassign body via the `payload` field rather than the
            scalar target_* fields.
        target_id:
          type: string
          description: >-
            Hex-encoded validator pubkey for validator-set ops; reused as
            the proposal-keying identifier for `domain_reassign` (typically
            the dotted-path domain name).
        target_pubkey:
          type: string
          description: Hex-encoded Ed25519 public key (required for add_validator).
        target_power:
          type: integer
          format: int64
          description: Validator power for add/update ops; ignored for domain_reassign.
        expiry_blocks:
          type: integer
          format: int64
          description: Proposal expiry in blocks (0 = chain default).
        reason:
          type: string
          description: Human-readable justification.
        payload:
          type: string
          description: >-
            Base64-encoded operation-specific payload (v8.0). For
            `domain_reassign`, the JSON-encoded body
            `{domain, new_owner_id, parent_domain, open_to_shared}` that
            the subsequent TxTypeDomainReassign execution tx must reproduce
            byte-for-byte. Empty for legacy validator-set ops.

    GovProposeResponse:
      type: object
      required:
        - proposal_id
        - tx_hash
        - status
      properties:
        proposal_id:
          type: string
          description: Deterministic on-chain proposal identifier.
        tx_hash:
          type: string
          description: CometBFT transaction hash.
        status:
          type: string
          example: voting

    GovVoteRequest:
      type: object
      required:
        - proposal_id
        - decision
      properties:
        proposal_id:
          type: string
          description: From the propose response.
        decision:
          type: string
          enum:
            - accept
            - reject
            - abstain

    GovVoteResponse:
      type: object
      required:
        - tx_hash
        - status
      properties:
        tx_hash:
          type: string
        status:
          type: string
          example: recorded

    GovCancelRequest:
      type: object
      required:
        - proposal_id
      properties:
        proposal_id:
          type: string

    GovCancelResponse:
      type: object
      required:
        - tx_hash
        - status
      properties:
        tx_hash:
          type: string
        status:
          type: string
          example: cancelled

    # -- Domain reassign (v8.0) ---------------------------------------------
    DomainReassignRequest:
      type: object
      required:
        - domain
        - new_owner_id
        - proposal_id
      properties:
        domain:
          type: string
          description: Dotted-path domain name to reassign.
        new_owner_id:
          type: string
          description: Hex(64) Ed25519 agent ID of the new owner.
        parent_domain:
          type: string
          description: >-
            Optional. Must match the existing parent or be left empty to
            preserve. Mismatched parents are rejected during FinalizeBlock.
        proposal_id:
          type: string
          description: >-
            Hex-encoded ID of the previously accepted gov_propose
            (`domain_reassign`) record. The execution tx is a no-op unless
            this proposal exists, has executed, and hasn't been consumed.
        open_to_shared:
          type: boolean
          default: false
          description: >-
            When true, also writes the on-chain `shared_domain:<name>`
            sentinel so post-fork access checks treat the domain as
            catch-all-writable.

    DomainReassignResponse:
      type: object
      required:
        - tx_hash
        - purged_grants
      properties:
        tx_hash:
          type: string
          description: CometBFT transaction hash of the executed reassignment.
        purged_grants:
          type: integer
          description: >-
            Number of grant entries cleared when the domain ownership
            flipped. The previous owner's chain-of-trust does not survive
            the reassign — operators audit this count to confirm the blast
            radius of recovery.

    # -- Orgs / Federation ---------------------------------------------------
    OrgRegisterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    OrgAddMemberRequest:
      type: object
      required:
        - agent_id
      properties:
        agent_id:
          type: string
        clearance:
          type: integer
          minimum: 0
          maximum: 4
          description: Defaults to 1 (INTERNAL).
        role:
          type: string
          description: "admin, member, or observer. Defaults to member."

    OrgSetClearanceRequest:
      type: object
      required:
        - agent_id
        - clearance
      properties:
        agent_id:
          type: string
        clearance:
          type: integer
          minimum: 0
          maximum: 4

    FederationProposeRequest:
      type: object
      required:
        - target_org_id
      properties:
        target_org_id:
          type: string
        allowed_domains:
          type: array
          items:
            type: string
          description: '["*"] means all domains.'
        allowed_depts:
          type: array
          items:
            type: string
        max_clearance:
          type: integer
          minimum: 0
          maximum: 4
          description: Ceiling clearance; defaults to 2 (CONFIDENTIAL).
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp; 0=permanent.
        requires_approval:
          type: boolean

    FederationRevokeRequest:
      type: object
      properties:
        reason:
          type: string

    # -- Departments ---------------------------------------------------------
    DeptRegisterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        parent_dept:
          type: string

    DeptAddMemberRequest:
      type: object
      required:
        - agent_id
      properties:
        agent_id:
          type: string
        clearance:
          type: integer
          minimum: 0
          maximum: 4
          description: Defaults to 1.
        role:
          type: string
          description: Defaults to member.

    # -- Pipeline ------------------------------------------------------------
    PipeSendRequest:
      type: object
      required:
        - payload
      properties:
        to_agent:
          type: string
          description: Target agent_id (direct). One of to_agent or to_provider required.
        to_provider:
          type: string
          description: Provider name or agent name; resolves to agent_id if unambiguous.
        intent:
          type: string
          description: Human description of the work.
        payload:
          type: string
          description: Arbitrary content.
        ttl_minutes:
          type: integer
          minimum: 1
          maximum: 1440
          description: Defaults to 60.

    PipeResultRequest:
      type: object
      required:
        - result
      properties:
        result:
          type: string

    PipelineMessage:
      type: object
      properties:
        pipe_id:
          type: string
        from_agent:
          type: string
        from_provider:
          type: string
        to_agent:
          type: string
        to_provider:
          type: string
        intent:
          type: string
        payload:
          type: string
        status:
          type: string
          description: pending, claimed, completed.
        result:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        claimed_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    # -- Embeddings ----------------------------------------------------------
    EmbedRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string

    EmbedResponse:
      type: object
      properties:
        embedding:
          type: array
          items:
            type: number
            format: float
        model:
          type: string
        dimension:
          type: integer

    EmbedInfoResponse:
      type: object
      properties:
        semantic:
          type: boolean
          description: >-
            True when a real embedding provider is available (or vault is
            active — in that case FTS5 cannot index encrypted content).
        provider:
          type: string
          description: Active embedding provider name (e.g. ollama, hash).
        dimension:
          type: integer
        ready:
          type: boolean

    # -- MCP Tokens ----------------------------------------------------------
    MCPTokenIssueRequest:
      type: object
      required:
        - agent_id
      properties:
        name:
          type: string
          description: Human label, e.g. "chatgpt-laptop".
        agent_id:
          type: string
          description: 64-char hex Ed25519 pubkey to mint for.

    MCPTokenIssueResponse:
      type: object
      properties:
        id:
          type: string
          description: Public token ID used for revocation.
        name:
          type: string
        agent_id:
          type: string
        token:
          type: string
          description: Base64url(32 random bytes). Shown ONCE — never stored in plaintext.
        created_at:
          type: string
          format: date-time
        use_hint:
          type: string

    MCPTokenSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        agent_id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: 1.0.0

    ReadinessResponse:
      type: object
      required:
        - status
        - postgres
        - cometbft
      properties:
        status:
          type: string
          example: ready
        postgres:
          type: boolean
        cometbft:
          type: boolean

    ProblemDetails:
      type: object
      description: RFC 7807 Problem Details for HTTP APIs.
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type.
        title:
          type: string
          description: Short, human-readable summary.
        status:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence.

  # -----------------------------------------------------------------------
  # Reusable responses
  # -----------------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid request body or parameters.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: >-
        Caller authenticated but lacks authorisation, or the request was
        rejected during on-chain finalisation (e.g. quorum-gated tx without
        an executed proposal). The `detail` field carries the upstream
        rejection reason.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict (e.g. duplicate submission or already voted).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalError:
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # -- Memory --------------------------------------------------------------
  /v1/memory/submit:
    post:
      operationId: submitMemory
      summary: Submit a new memory for consensus validation.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySubmitRequest"
      responses:
        "201":
          description: Memory submitted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySubmitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/query:
    post:
      operationId: queryMemories
      summary: Perform a vector similarity search over memories.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryQueryRequest"
      responses:
        "200":
          description: Query results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/search:
    post:
      operationId: searchMemories
      summary: Full-text search over memories (FTS5/BM25).
      description: >-
        Not available when vault (content encryption) is active — use
        GET /v1/embed/info to check; route to /v1/memory/query instead when
        semantic=true.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySearchRequest"
      responses:
        "200":
          description: Search results. Same shape as /v1/memory/query response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/hybrid:
    post:
      operationId: hybridSearchMemories
      summary: Fused FTS5 + vector search via Reciprocal Rank Fusion.
      description: >-
        At least one of `query` or `embedding` is required. Supports query
        expansions for multi-variant recall.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryHybridRequest"
      responses:
        "200":
          description: Hybrid search results. Same shape as /v1/memory/query response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/list:
    get:
      operationId: listMemories
      summary: Paginated memory list with RBAC agent isolation.
      tags:
        - Memory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: domain
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: agent
          in: query
          schema:
            type: string
          description: Filter by submitting agent ID.
      responses:
        "200":
          description: Paginated list of memories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoryRecord"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  filtered:
                    $ref: "#/components/schemas/FilterInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/timeline:
    get:
      operationId: getMemoryTimeline
      summary: Memory creation counts grouped by time bucket.
      tags:
        - Memory
      parameters:
        - name: domain
          in: query
          schema:
            type: string
        - name: bucket
          in: query
          schema:
            type: string
            default: hour
          description: Time bucket size.
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start time (RFC3339). Defaults to now-24h.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End time (RFC3339). Defaults to now.
      responses:
        "200":
          description: Timeline buckets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/tasks:
    get:
      operationId: getOpenTasks
      summary: Open task memories (type=task, status != done/dropped).
      tags:
        - Memory
      parameters:
        - name: domain
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Open tasks.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        memory_id:
                          type: string
                        content:
                          type: string
                        domain_tag:
                          type: string
                        task_status:
                          type: string
                        confidence_score:
                          type: number
                          format: double
                        created_at:
                          type: string
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/link:
    post:
      operationId: linkMemories
      summary: Link two memories with a relationship type (off-chain, no tx).
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryLinkRequest"
      responses:
        "200":
          description: Link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/pre-validate:
    post:
      operationId: preValidateMemory
      summary: Dry-run the per-node validation checks without submitting on-chain.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreValidateRequest"
      responses:
        "200":
          description: Per-validator decisions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreValidateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Pre-validation not configured on this node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /v1/memory/{memory_id}:
    get:
      operationId: getMemory
      summary: Retrieve a single memory by ID.
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      responses:
        "200":
          description: Full memory record with votes and corroborations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/{memory_id}/vote:
    post:
      operationId: voteOnMemory
      summary: Cast a validator vote on a proposed memory.
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteRequest"
      responses:
        "200":
          description: Vote recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/{memory_id}/challenge:
    post:
      operationId: challengeMemory
      summary: Challenge an existing committed memory.
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeRequest"
      responses:
        "200":
          description: Challenge submitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/{memory_id}/forget:
    post:
      operationId: forgetMemory
      summary: Semantic alias for challenge — submits a TxTypeMemoryChallenge with reason "deprecated by user".
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgetRequest"
      responses:
        "200":
          description: Memory forgotten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/{memory_id}/corroborate:
    post:
      operationId: corroborateMemory
      summary: Corroborate an existing memory with supporting evidence.
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorroborateRequest"
      responses:
        "200":
          description: Corroboration recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorroborateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/memory/{memory_id}/task-status:
    put:
      operationId: updateTaskStatus
      summary: Update task status for a task-type memory (off-chain only, no tx).
      tags:
        - Memory
      parameters:
        - $ref: "#/components/parameters/memoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusUpdateRequest"
      responses:
        "200":
          description: Task status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStatusUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- Agent ---------------------------------------------------------------
  /v1/agents:
    get:
      operationId: listRegisteredAgents
      summary: List all registered agents. No auth required.
      tags:
        - Agent
      security: []
      responses:
        "200":
          description: List of agents.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/RegisteredAgent"
                  total:
                    type: integer
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/agent/me:
    get:
      operationId: getAgentProfile
      summary: Retrieve the authenticated agent's profile.
      tags:
        - Agent
      responses:
        "200":
          description: Agent profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/agent/register:
    post:
      operationId: registerAgent
      summary: Register an agent on-chain via CometBFT consensus.
      description: >-
        Idempotent — returns existing record (HTTP 200) if agent is already
        registered. Returns HTTP 201 for new registrations.
      tags:
        - Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
      responses:
        "201":
          description: Agent registered (new registration).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredAgent"
        "200":
          description: Agent already registered (idempotent response).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredAgent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/agent/update:
    put:
      operationId: updateAgent
      summary: Update the authenticated agent's name and bio.
      description: Self-update only — agents can only modify their own metadata.
      tags:
        - Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdateRequest"
      responses:
        "200":
          description: Agent updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                  name:
                    type: string
                  status:
                    type: string
                    example: updated
                  tx_hash:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/agent/{id}:
    get:
      operationId: getRegisteredAgent
      summary: Get a registered agent by ID.
      tags:
        - Agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent's hex-encoded Ed25519 public key.
      responses:
        "200":
          description: Agent record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredAgent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/agent/{id}/permission:
    put:
      operationId: setAgentPermission
      summary: >-
        Set an agent's clearance, domain access, and visibility. Self-set OR
        global admin OR org admin in any org the target belongs to.
      description: >-
        PATCH semantics — omitted fields preserve their on-chain value.
      tags:
        - Agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Target agent's hex-encoded Ed25519 public key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSetPermissionRequest"
      responses:
        "200":
          description: Permissions updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                  status:
                    type: string
                    example: permissions_updated
                  tx_hash:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- Validator -----------------------------------------------------------
  /v1/validator/pending:
    get:
      operationId: getPendingMemories
      summary: List memories awaiting validator votes.
      tags:
        - Validator
      parameters:
        - name: domain_tag
          in: query
          required: false
          schema:
            type: string
          description: Filter by domain tag.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Maximum number of results.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor.
      responses:
        "200":
          description: Pending memories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingMemoriesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/validator/epoch:
    get:
      operationId: getEpochInfo
      summary: Retrieve current epoch information and validator scores.
      tags:
        - Validator
      responses:
        "200":
          description: Epoch info with per-validator PoE scores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpochInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- Access Control -------------------------------------------------------
  /v1/access/request:
