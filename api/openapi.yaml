  # -- Embeddings ---------------------------------------------------------
  /v1/embed:
    post:
      operationId: generateEmbedding
      summary: Generate a vector embedding via the node's local provider.
      tags:
        - Embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbedRequest"
      responses:
        "200":
          description: Embedding generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Embedder not ready.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /v1/embed/info:
    get:
      operationId: getEmbedInfo
      summary: Report the active embedding provider's capabilities.
      description: >-
        Clients use this to decide between vector query and FTS5 search paths.
        When vault (at-rest encryption) is active, semantic is forced true even
        if no embedder is configured.
      tags:
        - Embeddings
      responses:
        "200":
          description: Embedding provider info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbedInfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # -- MCP Tokens ---------------------------------------------------------
  /v1/mcp/tokens:
    post:
      operationId: issueMCPToken
      summary: Issue a bearer token for MCP clients that cannot sign Ed25519 requests.
      description: >-
        Ed25519 auth required (admin use). Token plaintext shown ONCE — not
        stored, only SHA-256 digest persisted.
      tags:
        - MCP Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPTokenIssueRequest"
      responses:
        "201":
          description: Token issued. Save the token value — it is never shown again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPTokenIssueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: MCP tokens not supported on this backend.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      operationId: listMCPTokens
      summary: List issued tokens as summaries (no token values returned).
      tags:
        - MCP Tokens
      responses:
        "200":
          description: Token summaries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/MCPTokenSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: MCP tokens not supported on this backend.

  /v1/mcp/tokens/{id}:
    delete:
      operationId: revokeMCPToken
      summary: Revoke a token by ID. Idempotent.
      tags:
        - MCP Tokens
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Token UUID.
      responses:
        "204":
          description: Token revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # -- Pipeline -----------------------------------------------------------
  /v1/pipe/send:
    post:
      operationId: pipeSend
      summary: Send a pipeline message to another agent or provider.
      tags:
        - Pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipeSendRequest"
      responses:
        "201":
          description: Pipeline message queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipe_id:
                    type: string
                  status:
                    type: string
                    example: pending
                  expires_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pipe/inbox:
    get:
      operationId: pipeInbox
      summary: Fetch pending messages for the authenticated agent. Auto-claims all returned items.
      tags:
        - Pipeline
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: Inbox items.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineMessage"
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pipe/results:
    get:
      operationId: pipeResults
      summary: Completed pipeline messages sent by the authenticated agent.
      tags:
        - Pipeline
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: Completed pipeline messages.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineMessage"
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pipe/{pipe_id}:
    get:
      operationId: pipeStatus
      summary: Get current status of a pipeline message.
      tags:
        - Pipeline
      parameters:
        - name: pipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline message status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pipe/{pipe_id}/claim:
    put:
      operationId: pipeClaim
      summary: Atomically claim a pipeline message (prevents double-processing).
      tags:
        - Pipeline
      parameters:
        - name: pipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message claimed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipe_id:
                    type: string
                  status:
                    type: string
                    example: claimed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/pipe/{pipe_id}/result:
    put:
      operationId: pipeResult
      summary: Submit result for a claimed message. Triggers auto-journal.
      description: >-
        Inserts an `observation` memory in domain `agent-pipeline` via
        off-chain insert.
      tags:
        - Pipeline
      parameters:
        - name: pipe_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipeResultRequest"
      responses:
        "200":
          description: Result submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: completed
                  journal_id:
                    type: string
                    description: memory_id of the auto-journal entry, or empty string.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- OAuth (root-level, no /v1/ prefix) ----------------------------------
  /.well-known/oauth-authorization-server:
    get:
      operationId: oauthDiscovery
      summary: RFC 8414 OAuth 2.0 Authorization Server Metadata.
      description: Discovery document for ChatGPT MCP connector compatibility.
      tags:
        - OAuth
      security: []
      responses:
        "200":
          description: Authorization server metadata document.
          content:
            application/json:
              schema:
                type: object

  /.well-known/oauth-protected-resource:
    get:
      operationId: oauthProtectedResource
      summary: RFC 9728 Protected Resource Metadata.
      tags:
        - OAuth
      security: []
      responses:
        "200":
          description: Protected resource metadata document.
          content:
            application/json:
              schema:
                type: object

  /oauth/register:
    post:
      operationId: oauthClientRegister
      summary: RFC 7591 Dynamic Client Registration (10 reqs/IP/hour).
      tags:
        - OAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Client registered.
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Rate limit exceeded.

  /oauth/authorize:
    get:
      operationId: oauthAuthorizeGet
      summary: Render PKCE consent screen.
      tags:
        - OAuth
      security: []
      parameters:
        - name: response_type
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: string
        - name: redirect_uri
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Consent screen HTML.
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: oauthAuthorizePost
      summary: Submit consent; mints bearer + issues auth code; redirects to redirect_uri.
      tags:
        - OAuth
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
      responses:
        "302":
          description: Redirect to redirect_uri with authorization code.

  /oauth/token:
    post:
      operationId: oauthToken
      summary: Exchange auth code for bearer (grant_type=authorization_code only).
      description: >-
        The access_token returned is accepted as Authorization: Bearer <token>
        on /v1/mcp/sse and /v1/mcp/streamable. Token lifetime is controlled by
        revocation (DELETE /v1/mcp/tokens/{id}), not expiry — expires_in=0.
      tags:
        - OAuth
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
                code_verifier:
                  type: string
      responses:
        "200":
          description: Token response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 0
        "400":
          $ref: "#/components/responses/BadRequest"

  # -- Operational ---------------------------------------------------------
  /health:
    get:
      operationId: healthCheck
      summary: Liveness probe.
      tags:
        - Operational
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      operationId: readinessCheck
      summary: Readiness probe — checks PostgreSQL and CometBFT connectivity.
      tags:
        - Operational
      security: []
      responses:
        "200":
          description: Service is ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
