                  type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- Domains ---------------------------------------------------------------
  /v1/domain/register:
    post:
      operationId: domainRegister
      summary: Register a domain. Caller becomes owner.
      tags:
        - Domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainRegisterRequest"
      responses:
        "201":
          description: Domain registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: registered
                  tx_hash:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/domain/{name}:
    get:
      operationId: getDomain
      summary: Get domain metadata.
      description: >-
        Ownership served from BadgerDB (chain-authoritative); description/created_at
        enriched from off-chain mirror.
      tags:
        - Domain
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Dotted-path domain name.
      responses:
        "200":
          description: Domain metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain_name:
                    type: string
                  owner_agent_id:
                    type: string
                  parent_domain:
                    type: string
                  created_height:
                    type: integer
                    format: int64
                  description:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/domain/reassign:
    post:
      operationId: reassignDomain
      summary: >-
        Execute a domain ownership reassignment authorised by a previously
        accepted governance proposal (v8.0 access-control recovery primitive).
      description: >-
        Quorum-gated recovery wrapper around BadgerStore.TransferDomain.
        Pre-requisites: a `gov_propose` of operation `domain_reassign` with
        the matching payload was accepted by a 3/4 validator supermajority
        and is in status `executed`. Submitting this tx burns the proposal
        (single-use) and purges all grants on the target domain. Caller must
        be a chain admin; ABCI re-verifies admin role on-chain.
      tags:
        - Domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainReassignRequest"
      responses:
        "200":
          description: Reassignment executed; previous grants purged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainReassignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

