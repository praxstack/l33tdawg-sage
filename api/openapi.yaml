                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/access/grant:
    post:
      operationId: accessGrant
      summary: Grant domain access. Caller must own the domain or be admin.
      tags:
        - Access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessGrantRequest"
      responses:
        "201":
          description: Access granted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: granted
                  tx_hash:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/access/revoke:
    post:
      operationId: accessRevoke
      summary: Revoke domain access.
      tags:
        - Access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRevokeRequest"
      responses:
        "200":
          description: Access revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: revoked
                  tx_hash:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/access/grants/{agent_id}:
    get:
      operationId: listAccessGrants
      summary: List active grants for an agent.
      tags:
        - Access
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          description: Hex-encoded agent ID.
      responses:
        "200":
          description: Array of grant objects.
          content:
            application/json:
              schema:
                type: array
