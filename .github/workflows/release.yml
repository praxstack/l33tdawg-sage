name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Note: the landing page is served from the `gh-pages` branch (GitHub Pages,
# legacy branch build). It is NOT deployed from this workflow — edit gh-pages
# directly to update the site. This workflow only builds release artifacts.
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          install-mode: binary

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true
      - run: go test ./... -count=1 -race

  goreleaser:
    name: GoReleaser (tarballs)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: 'v2.8.2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stable-named Linux tarball for direct download links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/sage-gui_${VERSION}_linux_amd64.tar.gz" "dist/sage-gui-linux-amd64.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "dist/sage-gui-linux-amd64.tar.gz" --clobber
        shell: bash

  linux-desktop:
    name: Linux Desktop Bundle
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build Linux desktop bundle
        env:
          SAGE_VERSION: ${{ github.ref_name }}
        run: ./installer/linux/build-linux.sh

      - name: Create stable-name copy for direct download links
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/linux-amd64/sage-gui_${VERSION}_linux_amd64.tar.gz" \
             "dist/linux-amd64/sage-desktop-linux-amd64.tar.gz"

      - name: Upload Linux desktop bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${{ github.ref_name }}" \
            "dist/linux-amd64/sage-gui_${VERSION}_linux_amd64.tar.gz" \
            "dist/linux-amd64/sage-desktop-linux-amd64.tar.gz" \
            --clobber

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    needs: goreleaser
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build DMG
        env:
          SAGE_VERSION: ${{ github.ref_name }}
          SAGE_ARCH: ${{ matrix.arch }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          NOTARIZE: ${{ secrets.APPLE_ID != '' && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Import signing certificate if provided
          if [ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]; then
            echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > /tmp/cert.p12
            KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import /tmp/cert.p12 -k build.keychain \
              -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
              -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm /tmp/cert.p12
          fi
          ./installer/macos/build-dmg.sh

      - name: Determine arch label
        id: arch
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "label=x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "label=arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/macos-${{ steps.arch.outputs.label }}/SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
             "dist/macos-${{ steps.arch.outputs.label }}/SAGE-macOS-${{ steps.arch.outputs.label }}.dmg"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The DMGs are uploaded outside goreleaser, so they never appear in its
          # checksums.txt — publish a sibling .sha256 per asset (bare filenames,
          # so `shasum -a 256 -c SAGE-….dmg.sha256` works from a download dir).
          cd "dist/macos-${{ steps.arch.outputs.label }}"
          for f in "SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
                   "SAGE-macOS-${{ steps.arch.outputs.label }}.dmg"; do
            shasum -a 256 "$f" > "$f.sha256"
          done
          gh release upload "${{ github.ref_name }}" \
            "SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
            "SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg.sha256" \
            "SAGE-macOS-${{ steps.arch.outputs.label }}.dmg" \
            "SAGE-macOS-${{ steps.arch.outputs.label }}.dmg.sha256" \
            --clobber

  windows-exe:
    name: Windows Installer
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis nsis-pluginapi

      - name: Install EnVar plugin for NSIS
        run: |
          # Download EnVar plugin for PATH manipulation
          wget -q https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip -O /tmp/envar.zip
          echo "e9aa92de351345ed82795251d838f1ae9041ba35af9d381a5780c7843b01f56a  /tmp/envar.zip" | sha256sum -c -
          sudo unzip -o /tmp/envar.zip -d /usr/share/nsis/

      - name: Build Windows installer
        env:
          SAGE_VERSION: ${{ github.ref_name }}
        run: ./installer/windows/build-exe.sh

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/windows-amd64/SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
             "dist/windows-amd64/SAGE-Windows-Setup.exe"

      - name: Upload EXE to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Installer built outside goreleaser → absent from its checksums.txt;
          # publish a sibling .sha256 per asset (bare filenames so
          # `sha256sum -c` works from a download dir).
          cd dist/windows-amd64
          for f in "SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
                   "SAGE-Windows-Setup.exe"; do
            sha256sum "$f" > "$f.sha256"
          done
          gh release upload "${{ github.ref_name }}" \
            "SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
            "SAGE-${{ github.ref_name }}-Windows-Setup.exe.sha256" \
            "SAGE-Windows-Setup.exe" \
            "SAGE-Windows-Setup.exe.sha256" \
            --clobber

  docker-mcp:
    name: Docker Image + MCP Registry
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update server.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" server.json
          sed -i "s|ghcr.io/l33tdawg/sage:[^\"]*|ghcr.io/l33tdawg/sage:${VERSION}|" server.json
          cat server.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/l33tdawg/sage:${{ steps.version.outputs.version }}
            ghcr.io/l33tdawg/sage:latest

      - name: Commit updated server.json back to repo
        continue-on-error: true  # Branch protection may block bot pushes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          git diff --cached --quiet && exit 0
          git commit -m "ci: update server.json to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

  pypi-publish:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify SDK version matches tag
        # Drift guard: the SDK must be bumped in lockstep (the chore commit
        # that normally follows the fix). If pyproject.toml still reads the
        # prior version the publish would either collide or ship stale code.
        # Fail fast here so the release pipeline doesn't partially-land.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SDK_VERSION=$(grep '^version =' sdk/python/pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          INIT_VERSION=$(grep '^__version__' sdk/python/src/sage_sdk/__init__.py | sed -E 's/__version__ = "(.+)"/\1/')
          echo "tag=${VERSION} pyproject=${SDK_VERSION} __init__=${INIT_VERSION}"
          if [ "${VERSION}" != "${SDK_VERSION}" ] || [ "${VERSION}" != "${INIT_VERSION}" ]; then
            echo "::error::SDK version drift — bump sdk/python/pyproject.toml and sdk/python/src/sage_sdk/__init__.py to ${VERSION} before tagging"
            exit 1
          fi

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: |
          cd sdk/python
          rm -rf dist
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: sdk/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
