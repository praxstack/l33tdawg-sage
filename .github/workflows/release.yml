name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_pages_only:
        description: 'Only deploy landing page (skip builds)'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.1.6
          install-mode: binary

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true
      - run: go test ./... -count=1 -race

  goreleaser:
    name: GoReleaser (tarballs)
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_pages_only }}
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: 'v2.8.2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stable-named Linux tarball for direct download links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/sage-gui_${VERSION}_linux_amd64.tar.gz" "dist/sage-gui-linux-amd64.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "dist/sage-gui-linux-amd64.tar.gz" --clobber
        shell: bash

  linux-desktop:
    name: Linux Desktop Bundle
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_pages_only }}
    needs: goreleaser
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true

      - name: Build Linux desktop bundle
        env:
          SAGE_VERSION: ${{ github.ref_name }}
        run: ./installer/linux/build-linux.sh

      - name: Create stable-name copy for direct download links
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/linux-amd64/sage-gui_${VERSION}_linux_amd64.tar.gz" \
             "dist/linux-amd64/sage-desktop-linux-amd64.tar.gz"

      - name: Upload Linux desktop bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${{ github.ref_name }}" \
            "dist/linux-amd64/sage-gui_${VERSION}_linux_amd64.tar.gz" \
            "dist/linux-amd64/sage-desktop-linux-amd64.tar.gz" \
            --clobber

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    if: ${{ !inputs.deploy_pages_only }}
    needs: goreleaser
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true

      - name: Build DMG
        env:
          SAGE_VERSION: ${{ github.ref_name }}
          SAGE_ARCH: ${{ matrix.arch }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          NOTARIZE: ${{ secrets.APPLE_ID != '' && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Import signing certificate if provided
          if [ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]; then
            echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > /tmp/cert.p12
            KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import /tmp/cert.p12 -k build.keychain \
              -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
              -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm /tmp/cert.p12
          fi
          ./installer/macos/build-dmg.sh

      - name: Determine arch label
        id: arch
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "label=x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "label=arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/macos-${{ steps.arch.outputs.label }}/SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
             "dist/macos-${{ steps.arch.outputs.label }}/SAGE-macOS-${{ steps.arch.outputs.label }}.dmg"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/macos-${{ steps.arch.outputs.label }}/SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
            "dist/macos-${{ steps.arch.outputs.label }}/SAGE-macOS-${{ steps.arch.outputs.label }}.dmg" \
            --clobber

  windows-exe:
    name: Windows Installer
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_pages_only }}
    needs: goreleaser
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: true

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis nsis-pluginapi

      - name: Install EnVar plugin for NSIS
        run: |
          # Download EnVar plugin for PATH manipulation
          wget -q https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip -O /tmp/envar.zip
          echo "e9aa92de351345ed82795251d838f1ae9041ba35af9d381a5780c7843b01f56a  /tmp/envar.zip" | sha256sum -c -
          sudo unzip -o /tmp/envar.zip -d /usr/share/nsis/

      - name: Build Windows installer
        env:
          SAGE_VERSION: ${{ github.ref_name }}
        run: ./installer/windows/build-exe.sh

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/windows-amd64/SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
             "dist/windows-amd64/SAGE-Windows-Setup.exe"

      - name: Upload EXE to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/windows-amd64/SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
            "dist/windows-amd64/SAGE-Windows-Setup.exe" \
            --clobber

  docker-mcp:
    name: Docker Image + MCP Registry
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_pages_only }}
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update server.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" server.json
          sed -i "s|ghcr.io/l33tdawg/sage:[^\"]*|ghcr.io/l33tdawg/sage:${VERSION}|" server.json
          cat server.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/l33tdawg/sage:${{ steps.version.outputs.version }}
            ghcr.io/l33tdawg/sage:latest

      - name: Commit updated server.json back to repo
        continue-on-error: true  # Branch protection may block bot pushes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          git diff --cached --quiet && exit 0
          git commit -m "ci: update server.json to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

  deploy-pages:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    if: ${{ always() && (inputs.deploy_pages_only || (!cancelled() && needs.goreleaser.result == 'success')) }}
    needs: [goreleaser, macos-dmg, windows-exe]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs
          overwrite: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
