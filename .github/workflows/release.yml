name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go test ./... -count=1 -race

  goreleaser:
    name: GoReleaser (tarballs)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stable-named Linux tarball for direct download links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/sage-gui_${VERSION}_linux_amd64.tar.gz" "dist/sage-gui-linux-amd64.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "dist/sage-gui-linux-amd64.tar.gz" --clobber
        shell: bash

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: macos-latest
    needs: goreleaser
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build DMG
        env:
          SAGE_VERSION: ${{ github.ref_name }}
          SAGE_ARCH: ${{ matrix.arch }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          NOTARIZE: ${{ secrets.APPLE_ID != '' && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Import signing certificate if provided
          if [ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]; then
            echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > /tmp/cert.p12
            KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import /tmp/cert.p12 -k build.keychain \
              -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
              -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm /tmp/cert.p12
          fi
          ./installer/macos/build-dmg.sh

      - name: Determine arch label
        id: arch
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "label=x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "label=arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/macos-${{ steps.arch.outputs.label }}/SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
             "dist/macos-${{ steps.arch.outputs.label }}/SAGE-macOS-${{ steps.arch.outputs.label }}.dmg"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/macos-${{ steps.arch.outputs.label }}/SAGE-${{ github.ref_name }}-macOS-${{ steps.arch.outputs.label }}.dmg" \
            "dist/macos-${{ steps.arch.outputs.label }}/SAGE-macOS-${{ steps.arch.outputs.label }}.dmg" \
            --clobber

  windows-exe:
    name: Windows Installer
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis nsis-pluginapi

      - name: Install EnVar plugin for NSIS
        run: |
          # Download EnVar plugin for PATH manipulation
          wget -q https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip -O /tmp/envar.zip
          sudo unzip -o /tmp/envar.zip -d /usr/share/nsis/

      - name: Build Windows installer
        env:
          SAGE_VERSION: ${{ github.ref_name }}
        run: ./installer/windows/build-exe.sh

      - name: Create stable-name copy for direct download links
        run: |
          cp "dist/windows-amd64/SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
             "dist/windows-amd64/SAGE-Windows-Setup.exe"

      - name: Upload EXE to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/windows-amd64/SAGE-${{ github.ref_name }}-Windows-Setup.exe" \
            "dist/windows-amd64/SAGE-Windows-Setup.exe" \
            --clobber

  deploy-pages:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    needs: [goreleaser, macos-dmg, windows-exe]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
