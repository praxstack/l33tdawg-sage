<!doctype html>
<html lang="en">
<!-- Standalone fullscreen MRI memory-brain. Shares the renderer with the
     in-dashboard MRI mode (web/static/js/mri-brain.js). Renders a blank brain
     if there is no live node / no memories yet (never synthetic data). No
     embeddings/full content cross the wire. -->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cerebrum · MRI</title>
<!-- three.js + 3d-force-graph are vendored, pre-bundled, and imported directly by
     mri-brain.js (vendor/sage-graph.bundle.js) - no importmap / CDN, renders offline. -->
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden}
  #mount{position:fixed;inset:0}
  a.back{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:9;
    color:#5d7395;font:11px ui-monospace,monospace;text-decoration:none}
  a.back:hover{color:#39d0ff}
</style>
</head>
<body>
<div id="mount"></div>
<a class="back" href="/ui/">← back to dashboard</a>
<script type="module">
  import { mountMriBrain } from '/ui/js/mri-brain.js';
  // limit/status are URL-overridable for stress-testing: /ui/mri.html?limit=8000
  const qp = new URLSearchParams(location.search);
  const limit = qp.get('limit') || '500';
  const status = qp.get('status') || 'all';
  mountMriBrain(document.getElementById('mount'), {
    fetchUrl: `/v1/dashboard/memory/graph?status=${encodeURIComponent(status)}&limit=${encodeURIComponent(limit)}`,
    showScan: true,
  });
</script>
</body>
</html>
