run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - noctx
    - gosec
    - prealloc

linters-settings:
  govet:
    enable:
      - shadow
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G104 # unhandled errors (too noisy with logger calls)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
